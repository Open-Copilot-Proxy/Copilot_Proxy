name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (Nuitka) — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ['3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install nuitka

      - name: Build with Nuitka
        run: |
          mkdir -p dist || true
          python -m nuitka --standalone --onefile --output-dir=dist main.py

      - name: Prepare named executable
        run: |
          mkdir -p out || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            # find the produced exe in dist and copy as standard name
            exe=$(ls dist/*.exe 2>/dev/null | head -n1 || true)
            if [ -z "$exe" ]; then
              # try PowerShell-style listing
              exe=$(powershell -Command "Get-ChildItem -Path dist -Filter *.exe -Name | Select-Object -First 1" 2>/dev/null || true)
            fi
            if [ -n "$exe" ]; then
              cp "$exe" out/Copilot_Proxy-windows.exe
            else
              echo "ERROR: built exe not found in dist"; ls -la dist || true; exit 1
            fi
          else
            # macOS: find produced single-file executable in dist
            bin=$(ls dist/* 2>/dev/null | grep -v '\.so$' | grep -v '\.pyd$' | head -n1 || true)
            if [ -n "$bin" ]; then
              cp "$bin" out/Copilot_Proxy-macos
              chmod +x out/Copilot_Proxy-macos
            else
              echo "ERROR: built binary not found in dist"; ls -la dist || true; exit 1
            fi
          fi

      - name: Upload build artifact (executable)
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            out/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          ls -la artifacts || true

      - name: Create Release (attach artifacts)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**
          generate_release_notes: true
          draft: false
          prerelease: false